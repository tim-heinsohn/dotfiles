# Minimal tmux profile with Vim-friendly navigation.

set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string '#{?@terminal_title,#{@terminal_title},#{session_name}}'

# Keep default prefix while adopting tmux gradually.
set -g prefix C-b
bind C-b send-prefix

# Vim-style keys in prompts and copy mode.
set -g status-keys vi
setw -g mode-keys vi

# Fast pane movement with hjkl (repeatable).
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Fast pane resize with Shift+hjkl.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Better copy-mode flow for Vim users.
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "$HOME/dotfiles/bin/tmux-copy-to-clipboard"

set -s escape-time 10

# Status bar: cyan accent matching i3status color_good (#00FFFF).
set -g status-style "bg=#009999,fg=#000000"
set -g status-left-style "bg=#009999,fg=#000000"
set -g status-right-style "bg=#009999,fg=#000000"
set -g window-status-style "bg=#009999,fg=#000000"
set -g window-status-current-style "bg=#00FFFF,fg=#000000,bold"

# Active pane: slightly lighter background; inactive pane text softened.
set -g window-style "bg=#1a1a2e,fg=#aaaaaa"
set -g window-active-style "bg=#2a2a3e,fg=#ffffff"
