session_name: dotfiles
start_directory: ~/dotfiles
windows:
  - window_name: "#dot"
    panes:
      - opencode
  - window_name: "dot>"
    panes:
      -
  - window_name: "dot_"
    panes:
      - nvim
  - window_name: "#p'agents"
    start_directory: ~/personal/agents
    panes:
      - opencode
  - window_name: "p'agents>"
    start_directory: ~/personal/agents
    panes:
      -
